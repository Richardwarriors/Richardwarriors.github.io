<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio – Jiajie He</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    :root {
      --primary: #2962ff;
      --bg: #f2f4f8;
      --text: #333;
      --muted: #666;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* -------- Navbar -------- */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      z-index: 100;
      border-bottom: 1px solid #e5e7eb;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
    }

    nav a:hover { color: var(--primary); }

    /* -------- Hero -------- */
    header {
      height: 100vh;
      padding-top: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-left: 20px;
      padding-right: 20px;
    }

    header h1 { font-size: 48px; margin-bottom: 10px; }

    header p {
      font-size: 20px;
      color: var(--muted);
      max-width: 600px;
    }

    section {
      max-width: 1200px;
      margin: 80px auto;
      padding: 0 20px;
    }

    section h2 {
      font-size: 36px;
      margin-bottom: 30px;
      text-align: center;
    }

    /* -------- Gallery -------- */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .gallery-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery-grid img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    /* -------- Lightbox -------- */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    .lightbox.active { display: flex; }

    /* -------- Map -------- */
    #map {
      width: 100%;
      height: 500px;
      border-radius: 14px;
      margin-top: 40px;
    }

    .countries-info {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover { text-decoration: underline; }

    /* Flag marker style */
    .flag-marker {
      font-size: 22px;
      line-height: 22px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav>
    <div class="nav-container">
      <a href="index.html">Home</a>
      <a href="#photography">Photography</a>
      <a href="#map-section">Map</a>
    </div>
  </nav>

  <!-- Hero -->
  <header id="home">
    <h1>Jiajie He</h1>
    <p>
      Researcher & Photographer & 3.H co-founder.<br />
      Exploring the world through data, models, and a camera.
    </p>
  </header>

  <!-- Photography -->
  <section id="photography">
    <h2>Photography</h2>
    <div class="gallery-grid">
      <img src="./photos/UK.png" alt="United Kingdom" />
      <img src="./photos/canada.png" alt="Canada" />
      <img src="./photos/USA.png" alt="United States" />
      <img src="./photos/China.png" alt="China" />
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img src="" alt="Expanded view" />
  </div>

  <!-- Map -->
  <section id="map-section">
    <h2>Countries I’ve Been To</h2>
    <div id="map"></div>
    <div class="countries-info">
      Highlighted countries represent places I have visited.
    </div>
  </section>

  <!-- Footer -->
  <footer>
    © 2025 Jiajie He ·
    <a href="mailto:your@email.com">Email</a> ·
    <a href="https://github.com/yourname" target="_blank">GitHub</a>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    /* ---------- Lightbox ---------- */
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");

    document.querySelectorAll(".gallery-grid img").forEach(img => {
      img.addEventListener("click", () => {
        lightboxImg.src = img.src;
        lightbox.classList.add("active");
      });
    });

    lightbox.addEventListener("click", () => {
      lightbox.classList.remove("active");
    });

    /* ---------- Map ---------- */
    const map = L.map("map").setView([25, 0], 2);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    // We will match BOTH alpha-2 and alpha-3 (because different geojson sources differ)
    const visitedA2 = new Set(["CN", "US", "GB", "CA"]);
    const visitedA3 = new Set(["CHN", "USA", "GBR", "CAN"]);

    // Flag markers (rough country centers)
    const flags = [
      { name: "China", code: "CN", emoji: "🇨🇳", lat: 35.8617, lng: 104.1954 },
      { name: "United States", code: "US", emoji: "🇺🇸", lat: 39.8283, lng: -98.5795 },
      { name: "United Kingdom", code: "GB", emoji: "🇬🇧", lat: 55.3781, lng: -3.4360 },
      { name: "Canada", code: "CA", emoji: "🇨🇦", lat: 56.1304, lng: -106.3468 }
    ];

    // Helper: detect country code from feature (robust)
    function getCodes(feature) {
      const id = (feature && feature.id) ? String(feature.id).toUpperCase() : "";
      const p = (feature && feature.properties) ? feature.properties : {};

      const a2 =
        (p.iso_a2 && String(p.iso_a2).toUpperCase()) ||
        (p.ISO_A2 && String(p.ISO_A2).toUpperCase()) ||
        (p["Alpha-2"] && String(p["Alpha-2"]).toUpperCase()) ||
        (id.length === 2 ? id : "");

      const a3 =
        (p.iso_a3 && String(p.iso_a3).toUpperCase()) ||
        (p.ISO_A3 && String(p.ISO_A3).toUpperCase()) ||
        (p["Alpha-3"] && String(p["Alpha-3"]).toUpperCase()) ||
        (id.length === 3 ? id : "");

      return { a2, a3 };
    }

    fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json")
      .then(res => res.json())
      .then(data => {
        const layer = L.geoJSON(data, {
          style: feature => {
            const { a2, a3 } = getCodes(feature);
            const visited = visitedA2.has(a2) || visitedA3.has(a3);

            return {
              fillColor: visited ? "#2962ff" : "#d7d7d7",
              fillOpacity: visited ? 0.6 : 0.15,
              color: visited ? "#1f47c6" : "#666",
              weight: visited ? 1.4 : 1
            };
          },
          onEachFeature: (feature, lyr) => {
            const { a2, a3 } = getCodes(feature);
            const visited = visitedA2.has(a2) || visitedA3.has(a3);

            if (visited) {
              const name =
                (feature.properties && feature.properties.name) ||
                (feature.properties && feature.properties.NAME) ||
                "Visited";

              lyr.bindTooltip(name, { sticky: true });
            }
          }
        }).addTo(map);

        // Add flag markers on top
        flags.forEach(f => {
          const icon = L.divIcon({
            className: "flag-marker",
            html: `<div class="flag-marker" title="${f.name}">${f.emoji}</div>`,
            iconSize: [22, 22],
            iconAnchor: [11, 11]
          });

          L.marker([f.lat, f.lng], { icon })
            .addTo(map)
            .bindTooltip(f.name, { sticky: true });
        });
      })
      .catch(err => {
        console.error("Failed to load geojson:", err);
      });
  </script>
</body>
</html>
